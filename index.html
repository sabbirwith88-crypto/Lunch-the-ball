<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start & Earn</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        text-align: center;
        background: rgba(0,0,0,0.2);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
        margin-bottom: 20px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        background: #ff7eb3;
        color: white;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        background: #ff4f91;
    }

    .status {
        margin-top: 20px;
        font-size: 14px;
        opacity: 0.8;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🚀 Start to Show Ads</h1>
    <button onclick="startAds()">Start</button>
    <div class="status" id="status">Waiting for action...</div>
</div>

<!-- Scripts -->
<script src="https://telegram.org/js/telegram-web-app.js?62"></script>
<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

<script>
function startAds() {
    const status = document.getElementById("status");
    status.innerText = "Loading ads...";

    try {
        if (typeof TelegramAdsController === "undefined") {
            throw new Error("Ad script not loaded");
        }

        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "1008310",
            appId: "7019",
        });

        status.innerText = "Ads started successfully ✅";
    } catch (error) {
        console.error(error);
        status.innerText = "Ad failed or not supported ❌";
    }
}
</script>

</body>
</html>
