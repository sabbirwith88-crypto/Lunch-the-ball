<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watch Ads & Earn</title>

  <!-- Gigapub Ad Script -->
  <script src="https://ad.gigapub.tech/script?id=6331"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
      margin-top: 100px;
    }

    h1 {
      font-size: 32px;
    }

    #balance {
      font-size: 22px;
      margin: 20px;
      color: #22c55e;
    }

    button {
      padding: 15px 40px;
      font-size: 20px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      color: #facc15;
    }
  </style>
</head>
<body>

  <h1>Watch Ads & Earn</h1>

  <div id="balance">Balance: 0 Coins</div>

  <button id="startBtn" onclick="showAd()">Start</button>

  <div id="status">Ready</div>

  <script>
    // Load balance from localStorage
    let coins = localStorage.getItem("coins") || 0;
    document.getElementById("balance").innerText = "Balance: " + coins + " Coins";

    function showAd() {
      let btn = document.getElementById("startBtn");
      let status = document.getElementById("status");

      // Check script loaded
      if (typeof window.showGiga !== "function") {
        status.innerText = "Ad not loaded ❌";
        return;
      }

      btn.disabled = true;
      status.innerText = "Loading Ad...";

      window.showGiga()
        .then(() => {
          // Reward
          coins = parseInt(coins) + 10;
          localStorage.setItem("coins", coins);

          document.getElementById("balance").innerText = "Balance: " + coins + " Coins";
          status.innerText = "Ad watched! +10 Coins ✅";
        })
        .catch((e) => {
          console.log(e);
          status.innerText = "Ads failed ❌ Try again";
        })
        .finally(() => {
          btn.disabled = false;
        });
    }
  </script>

</body>
</html>
